version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mechzo-postgres
    environment:
      POSTGRES_USER: mechzo
      POSTGRES_PASSWORD: mechzo
      POSTGRES_DB: mechzo
    ports:
      - "5432:5432"
    volumes:
      - mechzo-pg:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mechzo -d mechzo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mechzo-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - mechzo-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mechzo-pg:
  mechzo-redis:

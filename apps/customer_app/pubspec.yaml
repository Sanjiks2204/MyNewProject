name: mechzo_customer
description: Mechzo customer app — request roadside help, track providers, pay.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  dio: ^5.7.0

  mechzo_design:
    path: ../../packages/mechzo_design
  mechzo_models:
    path: ../../packages/mechzo_models
  mechzo_api:
    path: ../../packages/mechzo_api

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
